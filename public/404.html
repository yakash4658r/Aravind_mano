<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Dr. Aravind Manoharan Redirect</title>
    <script type="text/javascript">
      // SPA redirect hack for GitHub Pages
      // If we land here, it means the user hit a direct URL like /conditions/pancreatic-cancer
      // We need to redirect them to the hash router version: /#/conditions/pancreatic-cancer
      
      var pathSegmentsToKeep = 1; // Keep '/Aravind_mano'
      var l = window.location;
      
      // Get the path after '/Aravind_mano'
      var path = l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/');
      
      if (path) {
        // Redirect to /Aravind_mano/#/path
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/#/' + path +
          l.search + l.hash
        );
      } else {
        // Just go to root
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/'
        );
      }
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
